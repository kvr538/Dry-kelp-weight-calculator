<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다시마 위판 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 숫자 입력창 우측 위아래 화살표(스피너) 제거 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        /* 페이드인 애니메이션 */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-4 font-sans text-gray-800">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-5 mt-2">
        
        <h1 class="text-2xl font-bold text-center text-blue-700 mb-6">
            🌊 위판장 초고속 계산기
        </h1>

        <!-- 파레트 개수 선택 -->
        <div class="mb-6">
            <div class="grid grid-cols-4 gap-2" id="palletButtons">
                <!-- 버튼들은 자바스크립트로 생성됨 -->
            </div>
        </div>

        <!-- 무게 입력 영역 -->
        <div id="inputContainer" class="space-y-3 mb-6">
            <!-- 입력칸들은 자바스크립트로 생성됨 -->
        </div>

        <!-- 결과 표시 또는 계산 버튼 영역 -->
        <div id="resultArea">
            <button id="calcButton" onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-colors mb-6">
                결과 확인
            </button>
        </div>

        <!-- 초기화 버튼 -->
        <button onclick="resetApp()" class="w-full bg-gray-700 hover:bg-gray-800 active:bg-gray-900 text-white font-bold text-lg py-4 rounded-xl shadow-md transition-colors mt-2">
            ↻ 다음 차량 넘어가기
        </button>
    </div>

    <script>
        let currentPallets = 1;
        const weights = [];

        // 앱 초기화 및 그리기
        function renderApp() {
            renderPalletButtons();
            renderInputs();
            document.getElementById('resultArea').innerHTML = `
                <button id="calcButton" onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold text-xl py-4 rounded-xl shadow-md transition-colors mb-6">
                    결과 확인
                </button>
            `;
            // 첫 번째 칸 포커스
            setTimeout(() => {
                const firstInput = document.getElementById('weight-0');
                if(firstInput) firstInput.focus();
            }, 100);
        }

        // 파레트 버튼 그리기
        function renderPalletButtons() {
            const container = document.getElementById('palletButtons');
            let html = '';
            for (let i = 1; i <= 4; i++) {
                const isSelected = currentPallets === i;
                const classes = isSelected 
                    ? 'bg-blue-600 text-white shadow-md border-2 border-blue-700' 
                    : 'bg-gray-200 text-gray-600 hover:bg-gray-300';
                html += `<button onclick="setPallets(${i})" class="py-3 rounded-xl font-bold text-lg transition-colors ${classes}">${i}개</button>`;
            }
            container.innerHTML = html;
        }

        // 입력칸 그리기
        function renderInputs() {
            const container = document.getElementById('inputContainer');
            let html = '';
            for (let i = 0; i < currentPallets; i++) {
                const val = weights[i] !== undefined ? weights[i] : '';
                html += `
                    <div class="flex items-center space-x-3">
                        <span class="w-16 font-bold text-gray-600 text-right">${i + 1}차:</span>
                        <input type="number" id="weight-${i}" inputmode="decimal" value="${val}"
                               oninput="updateWeight(${i}, this.value)"
                               onkeydown="handleKey(event, ${i})"
                               placeholder="무게 (kg)"
                               class="flex-1 bg-gray-50 border-2 border-gray-300 rounded-xl px-4 py-3 text-xl font-bold focus:outline-none focus:border-blue-500 focus:bg-blue-50 transition-all">
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // 파레트 개수 변경
        function setPallets(num) {
            currentPallets = num;
            weights.length = 0; // 배열 초기화
            for(let i=0; i<num; i++) weights.push('');
            renderApp();
        }

        // 무게 값 업데이트
        function updateWeight(index, val) {
            weights[index] = val;
        }

        // 엔터키 처리
        function handleKey(e, index) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (index + 1 < currentPallets) {
                    document.getElementById(`weight-${index + 1}`).focus();
                } else {
                    calculate();
                    document.getElementById(`weight-${index}`).blur(); // 키보드 내림
                }
            }
        }

        // 계산 실행
        function calculate() {
            // 빈칸 체크
            for (let i = 0; i < currentPallets; i++) {
                if (weights[i] === '' || weights[i] === undefined) {
                    alert('모든 계근 값을 입력해주세요!');
                    return;
                }
            }

            let total = 0;
            for (let i = 0; i < currentPallets; i++) {
                total += parseFloat(weights[i]) || 0;
            }
            
            const palletDeduction = currentPallets * 35;
            const netWeight = total - palletDeduction;
            const actualCalculated = netWeight * 0.95;
            const actual = Math.floor(actualCalculated);

            // 결과 화면 그리기 (계산 과정 추가됨)
            const resultHtml = `
                <div class="bg-blue-50 border-2 border-blue-500 rounded-xl p-5 mb-4 shadow-inner fade-in">
                    
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-gray-600 font-bold text-lg">총중량</span>
                        <span class="text-2xl font-black text-gray-800">
                            ${total.toLocaleString()} <span class="text-lg">kg</span>
                        </span>
                    </div>

                    <!-- 계산 과정 박스 -->
                    <div class="bg-white rounded-lg p-3 my-4 text-sm text-gray-500 border border-blue-200">
                        <div class="flex justify-between mb-1">
                            <span>파레트 감량:</span>
                            <span>${currentPallets}개 × 35kg = -${palletDeduction}kg</span>
                        </div>
                        <div class="flex justify-between mb-1">
                            <span>순수 무게:</span>
                            <span>${total} - ${palletDeduction} = ${netWeight}kg</span>
                        </div>
                        <div class="flex justify-between font-semibold text-gray-600 border-t border-dashed mt-2 pt-2">
                            <span>적용 수식:</span>
                            <span>${netWeight} × 0.95 = ${actualCalculated}</span>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center pt-3 border-t border-blue-300">
                        <span class="text-blue-700 font-bold text-xl">실중량 (내림)</span>
                        <span class="text-4xl font-black text-blue-700">
                            ${actual.toLocaleString()} <span class="text-xl">kg</span>
                        </span>
                    </div>

                </div>
            `;
            document.getElementById('resultArea').innerHTML = resultHtml;
        }

        // 다음 차량 (초기화)
        function resetApp() {
            weights.length = 0;
            for(let i=0; i<currentPallets; i++) weights.push('');
            renderApp();
        }

        // 시작할 때 초기화
        setPallets(1);

    </script>
</body>
</html>
